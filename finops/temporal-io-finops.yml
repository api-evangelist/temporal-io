description: >-
  FinOps view of Temporal spend. The core Temporal server is open source (MIT)
  and free to self-host - in that model the cost is your own compute, database
  (persistence/visibility store), and operations, with no vendor invoice.
  Temporal Cloud is the managed offering, billed primarily on Actions (the unit
  of consumption - starting a workflow, recording a heartbeat, sending a signal,
  timers, retries, and similar billable operations), plus active storage and
  retained storage, against a plan minimum. Actions are volume-tiered, starting
  around $50 per million and decreasing with scale. Because Actions map directly
  to workflow and activity behavior, cost is driven by application design (retry
  policies, heartbeat frequency, signal/timer volume, history size).
notes: >-
  Cloud per-unit rates (Action tiers, active/retained storage) are as of the
  review date and are subject to change; verify on the Temporal Cloud pricing
  page. For self-hosted deployments, the dominant costs are infrastructure
  (Temporal services plus the persistence and visibility datastores) rather than
  a Temporal license fee.
