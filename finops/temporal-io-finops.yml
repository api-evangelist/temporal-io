meters:
- name: actions
  description: Billable Temporal Cloud Actions - workflow starts, signals, queries, heartbeats, timers, retries, and similar operations. Volume-tiered per million.
  unit: actions
  aggregation: sum
  dimensions:
  - account
  - namespace
- name: active_storage
  description: Active storage of open workflow execution state, billed per GB-hour.
  unit: gigabyte-hours
  aggregation: sum
  dimensions:
  - account
  - namespace
- name: retained_storage
  description: Retained (closed workflow) storage kept per the namespace retention period, billed per GB-hour.
  unit: gigabyte-hours
  aggregation: sum
  dimensions:
  - account
  - namespace
- name: self_hosted_compute
  description: Infrastructure cost of running the self-hosted Temporal cluster and its datastores (no Temporal invoice).
  unit: hours
  aggregation: sum
  dimensions:
  - deployment
principles:
- name: Visibility
  description: Track Actions, active storage, and retained storage per namespace; on self-hosted, monitor Temporal service and datastore infrastructure costs.
- name: Allocation
  description: Map namespaces to workloads/teams so Actions and storage roll up to internal cost centers.
- name: Optimization
  description: Tune retry policies and heartbeat frequency to reduce Actions, shorten retention to cut retained storage, and self-host when volume makes owned infrastructure cheaper than Cloud Actions.
- name: Accountability
  description: Assign owners per namespace; review monthly Actions and storage against the plan minimum, or self-hosted infrastructure budget.
